<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products using Map</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .card {
            width: 220px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        h3 {
            margin: 10px 0;
        }

        p {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Our Products</h1>

    <div class="container" id="products"></div>

    <script>
        const products = [
            {
                name: "Laptop",
                price: 55000,
                image: "https://via.placeholder.com/200x150?text=Laptop"
            },
            {
                name: "Mobile",
                price: 25000,
                image: "https://via.placeholder.com/200x150?text=Mobile"
            },
            {
                name: "Headphones",
                price: 2000,
                image: "https://via.placeholder.com/200x150?text=Headphones"
            },
            {
                name: "Smart Watch",
                price: 5000,
                image: "https://via.placeholder.com/200x150?text=Watch"
            }
        ];

        const productContainer = document.getElementById("products");

        productContainer.innerHTML = products.map(product => `
            <div class="card">
                <img src="${product.image}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p>₹${product.price}</p>
            </div>
        `).join("");
    </script>

</body>
</html>
